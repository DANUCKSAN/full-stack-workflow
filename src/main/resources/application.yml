server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventorydb}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

aws:
  region: ${AWS_REGION:ap-southeast-2}
  s3:
    bucket: ${S3_BUCKET_NAME:cloud-inventory-products-storage}
    cloudfrontDomain: ${CLOUDFRONT_DOMAIN:localhost}